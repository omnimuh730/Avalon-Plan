# Build NextOffer and push to Docker Hub when a PR targets master
# (and again when that PR is merged / pushed to master).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  — e.g. omnimuh730
#   DOCKERHUB_TOKEN     — Docker Hub access token (not your password)
#
# Optional repo variables:
#   DOCKER_IMAGE        — default: omnimuh730/nextoffer

name: Docker publish

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ vars.DOCKER_IMAGE || 'omnimuh730/nextoffer' }}

jobs:
  build-and-push:
    name: Build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${IMAGE_NAME}"
          SHA_SHORT="$(git rev-parse --short HEAD)"
          TAGS=()

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR="${{ github.event.pull_request.number }}"
            # PR builds: do not overwrite :latest — use PR + sha tags for testing.
            TAGS+=("${IMAGE}:pr-${PR}")
            TAGS+=("${IMAGE}:pr-${PR}-${SHA_SHORT}")
          else
            # master push / workflow_dispatch: update the live tags.
            TAGS+=("${IMAGE}:latest")
            TAGS+=("${IMAGE}:sha-${SHA_SHORT}")
            TAGS+=("${IMAGE}:amd64")
            # Date-based version for rollbacks (UTC).
            TAGS+=("${IMAGE}:$(date -u +%Y.%m.%d)-${SHA_SHORT}")
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
            echo "sha_short=${SHA_SHORT}"
          } >> "$GITHUB_OUTPUT"

          echo "Will push:"
          printf '  %s\n' "${TAGS[@]}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Match docker/publish.sh default — servers are linux/amd64.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=/api
            VITE_AVALON_SERVER=/avalon
            VITE_AI_BFF_URL=/ai-bff
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=nextoffer

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Docker image published"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Event | \`${{ github.event_name }}\` |"
            echo "| Ref | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ steps.meta.outputs.sha_short }}\` |"
            echo ""
            echo "### Tags"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "Pull: \`docker pull ${IMAGE_NAME}:latest\` (master) or \`docker pull ${IMAGE_NAME}:pr-N\` (PR)."
          } >> "$GITHUB_STEP_SUMMARY"
