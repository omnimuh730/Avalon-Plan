[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid
childlogdir=/tmp

[program:unified-ai]
command=node dist/index.js
directory=/app/unified-ai-server
environment=PORT=8790,MONGO_URL="%(ENV_MONGO_URL)s",MONGO_DB="%(ENV_MONGO_DB)s",HOST="0.0.0.0"
autostart=true
autorestart=true
priority=20
startsecs=3
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:athens-server]
command=node index.js
directory=/app/Athens-server
environment=PORT=8979,HOST="0.0.0.0",MONGO_URL="%(ENV_MONGO_URL)s",MONGO_DB="%(ENV_MONGO_DB)s",API_KEYS_ENCRYPTION_KEY="%(ENV_API_KEYS_ENCRYPTION_KEY)s",UNIFIED_AI_URL="http://127.0.0.1:8790",AI_BFF_URL="http://127.0.0.1:3920",PUPPETEER_CACHE_DIR="%(ENV_PUPPETEER_CACHE_DIR)s",PUPPETEER_ARGS="%(ENV_PUPPETEER_ARGS)s"
autostart=true
autorestart=true
priority=30
startsecs=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:avalon-relay]
command=node dist/index.js
directory=/app/project-avalon/packages/backend
environment=PORT=3847,HOST="0.0.0.0",CORS_ORIGIN="*"
autostart=true
autorestart=true
priority=40
startsecs=3
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:avalon-ai-bff]
command=node dist/index.js
directory=/app/project-avalon/packages/ai-bff
environment=PORT=3920,MONGO_URL="%(ENV_MONGO_URL)s",MONGO_DB="%(ENV_MONGO_DB)s",CORS_ORIGIN="*"
autostart=true
autorestart=true
priority=50
startsecs=3
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:vender-server]
command=node scripts/bridge.mjs
directory=/app/vender-server
environment=BRIDGE_HOST="0.0.0.0",BRIDGE_PORT=3848,MONGO_URL="%(ENV_MONGO_URL)s",MONGO_DB="%(ENV_MONGO_DB)s",API_KEYS_ENCRYPTION_KEY="%(ENV_API_KEYS_ENCRYPTION_KEY)s"
autostart=true
autorestart=true
priority=60
startsecs=3
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=100
startsecs=2
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
